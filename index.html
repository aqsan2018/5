<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-a-Love-Mole!</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔨</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;1,600;1,700&family=Orbitron:wght@400;500;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Meadow & Marigold palette */
            --forest-ink: #14322a;
            --moss-deep:  #1f5140;
            --sage:       #57a583;
            --sage-soft:  #b8e0c8;
            --meadow-0:   #f3faf1;
            --meadow-1:   #dff1e2;
            --cream:      #fff8ec;
            --honey:      #f4b942;
            --honey-2:    #e89a1b;
            --marigold:   #ff9538;
            --terracotta: #c4552a;

            --glass-bg:  rgba(255,255,255,0.20);
            --glass-brd: rgba(255,255,255,0.45);
            --shadow-lg: 0 20px 60px rgba(20,50,42,0.35);
            --grad-cta:  linear-gradient(135deg, #f4b942 0%, #e89a1b 50%, #c4552a 100%);
            --grad-leaf: linear-gradient(135deg, #57a583, #1f5140 70%, #14322a);
            --grad-soft: linear-gradient(135deg, rgba(255,255,255,0.45), rgba(255,255,255,0.15));
        }

        html, body {
            height: 100%; margin: 0; padding: 0;
            font-family: 'Nunito', system-ui, sans-serif;
            background: var(--meadow-0); color: var(--forest-ink);
            overflow: hidden;
        }
        * { box-sizing: border-box; }

        /* =====================================================
           PRELOADER — Meadow variant of cosmic heart loader
           ===================================================== */
        #loader {
            position: fixed; inset: 0; z-index: 300;
            background:
              radial-gradient(1200px 700px at 20% 10%, #d6efd6 0%, transparent 60%),
              radial-gradient(900px 700px at 90% 90%, #ffe1a8 0%, transparent 55%),
              linear-gradient(135deg, #f0f9ea, #dff1e2 55%, #ffe8b8);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity .7s ease; overflow: hidden;
        }
        #loader .stage { position: relative; width: 160px; height: 160px; display: flex; align-items: center; justify-content: center; }
        .loader-heart {
            width: 86px; height: 86px;
            animation: beat 1.1s ease-in-out infinite;
            filter: drop-shadow(0 10px 24px rgba(196,85,42,0.45));
        }
        .loader-heart svg { width: 100%; height: 100%; display: block; }
        @keyframes beat {
            0%,100% { transform: scale(1); }
            30% { transform: scale(1.22); }
            45% { transform: scale(.95); }
            65% { transform: scale(1.12); }
            80% { transform: scale(.98); }
        }
        #loader .petals { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
        #loader .petal {
            position: absolute; bottom: -20px; width: 14px; height: 14px;
            background: linear-gradient(135deg, #ffd67a, #f4b942);
            border-radius: 50% 0 50% 50%;
            opacity: .8; animation: rise linear infinite;
        }
        @keyframes rise {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: .85; }
            100% { transform: translateY(-110vh) rotate(540deg); opacity: 0; }
        }
        #loader .msg {
            margin-top: 28px; font-family:'Fraunces', serif; font-style: italic;
            color: var(--moss-deep); letter-spacing: .04em; font-size: 18px;
            min-height: 26px; text-align: center; padding: 0 16px;
            animation: msgFade .6s ease;
        }
        #loader .dots { display:inline-block; width: 22px; text-align:left; }
        #loader .dots::after { content:''; animation: dots 1.4s steps(4, end) infinite; }
        @keyframes dots { 0%{content:'';} 25%{content:'.';} 50%{content:'..';} 75%{content:'...';} 100%{content:'';} }
        @keyframes msgFade { from { opacity:0; transform: translateY(6px);} to { opacity:1; transform:none;} }
        #loader .hint {
            margin-top: 10px; font-size: 12px; color: var(--terracotta);
            letter-spacing:.16em; text-transform: uppercase; opacity:.8;
            font-family: 'Orbitron', sans-serif;
        }

        /* =====================================================
           LOCK — Meadow glassmorphic keypad
           ===================================================== */
        #password-overlay {
            position: fixed; inset: 0; z-index: 200;
            display: flex; align-items: center; justify-content: center; padding: 24px;
            background:
              radial-gradient(900px 600px at 15% 15%, rgba(87,165,131,.45), transparent 60%),
              radial-gradient(900px 600px at 85% 85%, rgba(244,185,66,.5), transparent 60%),
              linear-gradient(135deg, rgba(20,50,42,.55), rgba(196,85,42,.35));
            backdrop-filter: blur(14px) saturate(140%);
            transition: opacity .5s ease;
        }
        #lock-box {
            width: 100%; max-width: 380px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-brd);
            border-radius: 24px;
            padding: 32px 28px 28px;
            backdrop-filter: blur(24px) saturate(160%);
            box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,0.55);
            text-align: center;
            animation: floatIn .7s cubic-bezier(.2,.9,.2,1.1) both;
        }
        @keyframes floatIn { from { opacity: 0; transform: translateY(20px) scale(.96); } to { opacity: 1; transform: none; } }
        .lock-icon {
            width: 84px; height: 84px; margin: 0 auto 14px;
            position: relative; display: grid; place-items: center;
            border-radius: 50%;
            background: var(--grad-cta);
            box-shadow: 0 12px 30px rgba(196,85,42,.5), inset 0 2px 0 rgba(255,255,255,.5);
            animation: lockEntry 1.1s cubic-bezier(.2,.9,.2,1.3) both, lockBreath 3.6s ease-in-out 1.1s infinite;
        }
        .lock-icon::before {
            content: ''; position: absolute; inset: -14px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,.6);
            opacity: 0; animation: haloRing 2.8s ease-out 1.2s infinite;
            pointer-events: none;
        }
        .lock-icon svg {
            width: 42px; height: 42px;
            color: white; position: relative; z-index: 1; overflow: visible;
        }
        .lock-icon .shackle {
            transition: transform .6s cubic-bezier(.5,-0.4,.3,1.6);
            transform-origin: 0% 100%;
            transform-box: fill-box;
            animation: shackleJiggle 4s ease-in-out 1.4s infinite;
        }
        .lock-icon.unlocked { animation: lockPop .8s cubic-bezier(.2,.9,.2,1.4) both; }
        .lock-icon.unlocked .shackle { transform: rotate(-48deg) translate(0,-10px); animation: none; }
        .lock-icon::after {
            content: ''; position: absolute; inset: -8px; border-radius: 50%;
            background: radial-gradient(closest-side, rgba(255,255,255,.75), transparent 70%);
            opacity: 0; transition: opacity .5s; pointer-events: none;
        }
        .lock-icon.unlocked::after { opacity: 1; animation: pulseGlow 1s ease-out; }
        .lock-icon.wrong { animation: duduNo .55s cubic-bezier(.36,.07,.19,.97) both; }
        .lock-icon.wrong svg { animation: gifPop .55s ease-out both; }
        .lock-icon.wrong::after {
            opacity: 1;
            background: radial-gradient(closest-side, rgba(255,149,56,.8), transparent 70%);
            animation: pulseGlow .6s ease-out;
        }
        @keyframes duduNo {
            0%, 100% { transform: translateX(0) rotate(0); }
            15% { transform: translateX(-10px) rotate(-4deg); }
            30% { transform: translateX(10px)  rotate(4deg); }
            45% { transform: translateX(-8px)  rotate(-3deg); }
            60% { transform: translateX(8px)   rotate(3deg); }
            80% { transform: translateX(-3px)  rotate(-1deg); }
        }
        @keyframes gifPop {
            0%   { transform: scale(1); }
            35%  { transform: scale(1.12); }
            70%  { transform: scale(.96); }
            100% { transform: scale(1); }
        }
        @keyframes pulseGlow { 0% { transform: scale(.9); opacity: .9; } 100% { transform: scale(1.8); opacity: 0; } }
        @keyframes lockEntry {
            0%   { opacity: 0; transform: translateY(-30px) scale(.4) rotate(-18deg); }
            60%  { opacity: 1; transform: translateY(6px) scale(1.08) rotate(4deg); }
            80%  { transform: translateY(-2px) scale(.98) rotate(-2deg); }
            100% { opacity: 1; transform: none; }
        }
        @keyframes lockBreath {
            0%,100% { box-shadow: 0 12px 30px rgba(196,85,42,.5), inset 0 2px 0 rgba(255,255,255,.5); transform: scale(1); }
            50%     { box-shadow: 0 18px 44px rgba(196,85,42,.6), inset 0 2px 0 rgba(255,255,255,.55); transform: scale(1.04); }
        }
        @keyframes shackleJiggle {
            0%, 88%, 100% { transform: rotate(0) translateY(0); }
            92% { transform: rotate(-6deg) translateY(-1px); }
            96% { transform: rotate(5deg) translateY(-1px); }
        }
        @keyframes haloRing {
            0%   { opacity: .6; transform: scale(.85); }
            80%  { opacity: 0;   transform: scale(1.35); }
            100% { opacity: 0;   transform: scale(1.35); }
        }
        @keyframes lockPop {
            0%   { transform: scale(1); }
            35%  { transform: scale(1.22) rotate(-6deg); }
            65%  { transform: scale(.94) rotate(3deg); }
            100% { transform: scale(1) rotate(0); }
        }
        #lock-box h3 {
            font-family: 'Fraunces', serif; font-style: italic;
            font-size: 22px; color: var(--cream); margin: 0 0 4px;
            text-shadow: 0 2px 10px rgba(20,50,42,.35);
        }
        #lock-box .sub {
            font-size: 13px; color: rgba(255,248,236,.85);
            margin: 0 0 18px; font-family: 'Nunito', sans-serif;
        }
        #password-input {
            font-family: 'Orbitron', sans-serif;
            width: 100%; padding: 14px 16px;
            border-radius: 12px;
            border: 1.5px solid rgba(255,255,255,.4);
            background: rgba(255,255,255,.7);
            color: var(--moss-deep);
            font-size: 1.25rem; text-align: center; letter-spacing: 8px;
            transition: all .25s ease;
        }
        #password-input:focus {
            outline: none; border-color: var(--honey);
            background: white;
            box-shadow: 0 0 0 4px rgba(244,185,66,.28);
        }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 16px; }
        .key {
            padding: 14px 0; border-radius: 14px;
            border: 1px solid rgba(255,255,255,.5);
            background: var(--grad-soft);
            color: var(--cream);
            font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 600;
            cursor: pointer; user-select: none;
            transition: transform .12s ease, box-shadow .2s ease, background .2s ease, border-color .2s ease;
            backdrop-filter: blur(8px);
            animation: keyIn .5s ease both;
            text-shadow: 0 1px 4px rgba(20,50,42,.4);
        }
        .key:hover { background: linear-gradient(135deg, rgba(255,255,255,.6), rgba(255,255,255,.3)); border-color: rgba(255,255,255,.7); }
        .key:active { transform: scale(.92); box-shadow: 0 4px 12px rgba(196,85,42,.3); }
        .key.action { background: var(--grad-cta); color: white; border: none; text-shadow: none; }
        .key.action:hover { filter: brightness(1.05); }
        .key.ghost { background: rgba(255,255,255,.2); }
        @keyframes keyIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
        .keypad .key:nth-child(1){animation-delay:.05s}.keypad .key:nth-child(2){animation-delay:.09s}
        .keypad .key:nth-child(3){animation-delay:.13s}.keypad .key:nth-child(4){animation-delay:.17s}
        .keypad .key:nth-child(5){animation-delay:.21s}.keypad .key:nth-child(6){animation-delay:.25s}
        .keypad .key:nth-child(7){animation-delay:.29s}.keypad .key:nth-child(8){animation-delay:.33s}
        .keypad .key:nth-child(9){animation-delay:.37s}.keypad .key:nth-child(10){animation-delay:.41s}
        .keypad .key:nth-child(11){animation-delay:.45s}.keypad .key:nth-child(12){animation-delay:.49s}
        #submit-button { display: none; }
        #error-message {
            color: #ffd67a; font-family: 'Nunito', sans-serif;
            font-size: .88rem; height: 1.1rem; margin-top: 10px; font-weight: 600;
            text-shadow: 0 0 8px rgba(196,85,42,.5);
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.3s ease-in-out; }

        #wrong-gif {
            display: none;
            width: 150px; height: 150px;
            border-radius: 18px;
            margin: 12px auto 0;
            object-fit: cover;
            box-shadow: 0 8px 20px rgba(196,85,42,.35);
        }
        #wrong-gif.show { display: block; animation: floatIn .3s ease both; }

        /* =====================================================
           MAIN CONTENT — Whack-a-Love-Mole meadow theme
           ===================================================== */
        #main-content {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.5s ease-in;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: absolute;
            top: 0; left: 0;
            padding: 1rem;
            background:
              radial-gradient(1100px 700px at 15% 10%, #e6f4d9 0%, transparent 60%),
              radial-gradient(900px 700px at 90% 90%, #ffe1a8 0%, transparent 55%),
              linear-gradient(160deg, var(--meadow-0), var(--meadow-1) 60%, #ffeccc);
        }
        #main-content.visible { visibility: visible; opacity: 1; }

        #game-area {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 1rem;
            background: linear-gradient(140deg, var(--moss-deep), var(--forest-ink));
            padding: 1.25rem;
            border-radius: 2rem;
            box-shadow:
              0 18px 40px rgba(20,50,42,.35),
              inset 0 2px 0 rgba(255,255,255,.08),
              inset 0 -4px 0 rgba(0,0,0,.25);
            position: relative;
            margin-bottom: 2rem;
            width: 300px; height: 300px;
            border: 2px solid rgba(255,214,122,.35);
        }
        @media (min-width: 640px) {
            #game-area { gap: 1.5rem; padding: 1.5rem; width: 360px; height: 360px; }
        }

        .hole {
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at 50% 35%, #0d2019 0%, #14322a 55%, #1a3c30 100%);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
            box-shadow:
              inset 0 8px 14px rgba(0,0,0,.55),
              inset 0 -3px 0 rgba(87,165,131,.4),
              0 2px 0 rgba(255,255,255,.05);
            border: 1px solid rgba(87,165,131,.35);
        }
        .hole::after {
            content:''; position:absolute; left:50%; bottom:-2px;
            width: 78%; height: 12px; transform: translateX(-50%);
            background: radial-gradient(ellipse, rgba(0,0,0,.55), transparent 70%);
            border-radius: 50%; pointer-events:none;
        }

        .mole {
            position: absolute;
            bottom: -100px;
            transition: bottom 0.2s ease-out;
            cursor: pointer;
            user-select: none;
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
        }
        .mole.up { bottom: 5px; }
        .mole.hit { animation: hit-animation 0.2s ease-out; opacity: 0; }
        @keyframes hit-animation {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
            100% { transform: scale(0.8); opacity: 0; }
        }

        #score-board {
            background: rgba(255,255,255,.9);
            padding: 1rem 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 8px 22px rgba(20,50,42,.15), inset 0 1px 0 rgba(255,255,255,.9);
            margin-bottom: 1.5rem;
            display: flex; gap: 2rem;
            font-family: 'Fraunces', serif; font-style: italic;
            font-size: 1.6rem; color: var(--moss-deep);
            border: 1.5px solid rgba(87,165,131,.35);
        }
        #score-board span { color: var(--terracotta); font-weight: 700; }

        #start-button, #play-again-button {
            font-family: 'Nunito', sans-serif; font-weight: 800;
            padding: 14px 34px; border-radius: 999px; border: none;
            color: white; cursor: pointer; font-size: 1.25rem;
            background: var(--grad-cta);
            box-shadow: 0 12px 26px rgba(196,85,42,.4), inset 0 1px 0 rgba(255,255,255,.35);
            letter-spacing: .04em;
            transition: transform .15s ease, filter .2s ease;
        }
        #start-button:hover, #play-again-button:hover { filter: brightness(1.06); transform: translateY(-2px); }
        #start-button:active, #play-again-button:active { transform: translateY(0); }

        #game-over-screen {
            position: absolute; inset: 0; z-index: 200;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 1.5rem;
            pointer-events: none;
            background:
              radial-gradient(1100px 700px at 15% 10%, rgba(230,244,217,.96) 0%, transparent 60%),
              radial-gradient(900px 700px at 90% 90%, rgba(255,225,168,.96) 0%, transparent 55%),
              linear-gradient(160deg, rgba(243,250,241,.98), rgba(223,241,226,.98) 60%, rgba(255,236,204,.98));
        }
        #game-over-screen.active { pointer-events: auto; }
        .letterbox {
            background: linear-gradient(160deg, rgba(255,248,236,.96), rgba(223,241,226,.96));
            border-radius: 24px;
            padding: 2rem 2.25rem;
            box-shadow: 0 20px 50px rgba(20,50,42,.25), inset 0 1px 0 rgba(255,255,255,.8);
            animation: letterboxIn 0.8s cubic-bezier(.2,.9,.2,1.3) both;
            pointer-events: auto;
        }
        @keyframes letterboxIn {
            0% { opacity: 0; transform: translateY(30px) scale(0.88); }
            70% { opacity: 1; transform: translateY(-6px) scale(1.02); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        #final-message {
            font-family: 'Fraunces', serif; font-style: italic;
            font-size: 2.6rem;
            background: linear-gradient(120deg, var(--moss-deep), var(--terracotta) 50%, var(--honey-2));
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 16px rgba(196,85,42,.3));
            margin-bottom: 1rem;
        }
        #result-gif {
            width: 12rem; height: 12rem;
            border-radius: 1.25rem;
            border: 3px solid var(--honey);
            box-shadow: 0 12px 28px rgba(20,50,42,.25);
            object-fit: cover;
        }
        #final-score {
            font-family: 'Nunito', sans-serif;
            font-size: 1.6rem; font-weight: 700;
            color: var(--moss-deep); margin: 1rem 0 0;
        }
        #play-again-button {
            margin-top: 1.5rem;
            pointer-events: auto;
            animation: buttonIn 0.6s ease 0.45s both;
        }
        @keyframes buttonIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: none; }
        }

        /* Confetti / rain / bomb */
        .confetti {
            position: fixed;
            width: 10px; height: 10px;
            background-color: #f4b942;
            animation: confetti-fall 2s linear forwards;
            pointer-events: none;
            border-radius: 50%;
            opacity: 0;
            z-index: 199;
        }
        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
        .rain {
            position: fixed; top: -10vh;
            font-size: 2rem;
            pointer-events: none; user-select: none;
            animation: fall 5s linear forwards;
            z-index: 300;
        }
        @keyframes fall {
            0% { transform: translateY(0vh); opacity: 1; }
            100% { transform: translateY(110vh); opacity: 1; }
        }
        .bomb-effect {
            position: fixed; font-size: 3rem;
            animation: bomb-pop 0.5s ease-out forwards;
            pointer-events: none; z-index: 400;
        }
        @keyframes bomb-pop {
            0% { transform: scale(0.5); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.8; }
            100% { transform: scale(1.2); opacity: 0; }
        }

        .hidden { display: none !important; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation: none !important; transition: none !important; }
        }
    </style>
</head>
<body>

    <!-- Preloader -->
    <div id="loader">
      <div class="petals" id="loaderPetals"></div>
      <div class="stage">
        <div class="loader-heart">
          <svg viewBox="0 0 24 24" fill="url(#heartGrad)" aria-hidden="true">
            <defs>
              <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ffd67a"/>
                <stop offset="55%" stop-color="#f4b942"/>
                <stop offset="100%" stop-color="#c4552a"/>
              </linearGradient>
            </defs>
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
          </svg>
        </div>
      </div>
      <p class="msg"><span id="loaderMsg">Waking up the sleepy moles</span><span class="dots"></span></p>
      <p class="hint">A tiny meadow is loading</p>
    </div>

    <!-- Lock -->
    <div id="password-overlay">
        <form id="lock-box" autocomplete="off">
            <div class="lock-icon" id="lockIcon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path class="shackle" d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    <rect x="4" y="11" width="16" height="10" rx="2"/>
                </svg>
            </div>
            <h3>Catch the Right One</h3>
            <p class="sub">Type the secret code 💕</p>
            <input id="password-input" type="password" inputmode="numeric" maxlength="8" placeholder="• • • • • • • •" autocomplete="off">
            <div class="keypad" id="keypad">
                <button type="button" class="key" data-k="1">1</button>
                <button type="button" class="key" data-k="2">2</button>
                <button type="button" class="key" data-k="3">3</button>
                <button type="button" class="key" data-k="4">4</button>
                <button type="button" class="key" data-k="5">5</button>
                <button type="button" class="key" data-k="6">6</button>
                <button type="button" class="key" data-k="7">7</button>
                <button type="button" class="key" data-k="8">8</button>
                <button type="button" class="key" data-k="9">9</button>
                <button type="button" class="key ghost" data-k="clear">⌫</button>
                <button type="button" class="key" data-k="0">0</button>
                <button type="submit" class="key action">Open</button>
            </div>
            <p id="error-message"></p>
            <img id="wrong-gif" src="dudu-no-dudu.gif" alt="Dudu Bubu saying no">
            <button id="submit-button" type="submit" aria-hidden="true">Unlock</button>
        </form>
    </div>

    <!-- Main Content -->
    <div id="main-content">
        <div id="score-board">
            <div>Score: <span id="score">0</span></div>
            <div>Time: <span id="time">30</span>s</div>
        </div>

        <div id="game-area"></div>

        <button id="start-button">Start Game!</button>

        <div id="game-over-screen">
            <div class="letterbox">
                <h1 id="final-message"></h1>
                <img id="result-gif" src="" alt="Result GIF">
                <p id="final-score"></p>
            </div>
            <button id="play-again-button">Play Again!</button>
        </div>
    </div>

    <audio id="good-sound" src="good_sound.mp3"></audio>
    <audio id="bad-sound" src="bad_sound.mp3"></audio>

    <script>
        /* ---------- Loader ---------- */
        (function initLoader(){
            const petals = document.getElementById('loaderPetals');
            if (petals) {
                for (let i = 0; i < 40; i++) {
                    const p = document.createElement('span');
                    p.className = 'petal';
                    p.style.left = Math.random() * 100 + '%';
                    const dur = 6 + Math.random() * 8;
                    p.style.animationDuration = dur + 's';
                    p.style.animationDelay = (-Math.random() * dur) + 's';
                    const size = 2 + Math.random() * 3;
                    p.style.width = size + 'px';
                    p.style.height = size + 'px';
                    p.style.opacity = (.5 + Math.random() * .5).toFixed(2);
                    petals.appendChild(p);
                }
            }
            const msgEl = document.getElementById('loaderMsg');
            const messages = [
                'waking up the sleepy moles',
                'planting tiny meadow flowers',
                'polishing the little hammer',
                'sprinkling honey on the grass',
                'almost ready for you, my love'
            ];
            let mi = 0;
            const msgTimer = setInterval(() => {
                if (!msgEl) return;
                mi = (mi + 1) % messages.length;
                msgEl.style.animation = 'none';
                void msgEl.offsetWidth;
                msgEl.style.animation = '';
                msgEl.textContent = messages[mi];
            }, 1600);
            window.addEventListener('load', () => {
                setTimeout(() => {
                    clearInterval(msgTimer);
                    const l = document.getElementById('loader');
                    if (!l) return;
                    l.style.opacity = '0';
                    setTimeout(() => l.remove(), 700);
                }, 1200);
            });
        })();

        document.addEventListener('DOMContentLoaded', () => {

            /* ---------- Lock ---------- */
            const passwordOverlay = document.getElementById('password-overlay');
            const lockBox = document.getElementById('lock-box');
            const passwordInput = document.getElementById('password-input');
            const errorMessage = document.getElementById('error-message');
            const mainContent = document.getElementById('main-content');
            const lockIcon = document.getElementById('lockIcon');
            const correctPassword = "28072018";

            if (sessionStorage.getItem('isUnlocked') === 'true') {
                passwordOverlay.style.display = 'none';
                mainContent.classList.add('visible');
                initializeGame();
            }

            document.getElementById('keypad').addEventListener('click', (e) => {
                const k = e.target.closest('.key');
                if (!k) return;
                const v = k.dataset.k;
                if (!v) return;
                if (v === 'clear') passwordInput.value = passwordInput.value.slice(0, -1);
                else if (passwordInput.value.length < 8) passwordInput.value += v;
            });

            lockBox.addEventListener('submit', (e) => {
                e.preventDefault();
                const enteredPassword = passwordInput.value;
                if (enteredPassword === correctPassword) {
                    sessionStorage.setItem('isUnlocked', 'true');
                    lockIcon.classList.remove('wrong');
                    const wrongGif = document.getElementById('wrong-gif');
                    if (wrongGif) wrongGif.classList.remove('show');
                    lockIcon.classList.add('unlocked');
                    setTimeout(() => {
                        passwordOverlay.style.opacity = '0';
                        setTimeout(() => { passwordOverlay.style.display = 'none'; }, 500);
                        mainContent.classList.add('visible');
                        initializeGame();
                    }, 600);
                } else {
                    errorMessage.textContent = 'Wrong Password. Try Again!';
                    lockBox.classList.add('shake');
                    const wrongGif = document.getElementById('wrong-gif');
                    lockIcon.classList.remove('wrong');
                    void lockIcon.offsetWidth;
                    lockIcon.classList.add('wrong');
                    if (wrongGif) {
                        wrongGif.classList.remove('show');
                        void wrongGif.offsetWidth;
                        wrongGif.classList.add('show');
                    }
                    passwordInput.value = '';
                    setTimeout(() => {
                        lockBox.classList.remove('shake');
                        lockIcon.classList.remove('wrong');
                        errorMessage.textContent = '';
                        if (wrongGif) wrongGif.classList.remove('show');
                    }, 1400);
                }
            });

            /* ---------- Game (logic unchanged) ---------- */
            let score = 0;
            let time = 30;
            let timerId;
            let molePopTimerId;
            let lastHole;
            let gameStarted = false;
            let rainInterval;
            const holes = [];

            const gameArea = document.getElementById('game-area');
            const scoreSpan = document.getElementById('score');
            const timeSpan = document.getElementById('time');
            const startButton = document.getElementById('start-button');
            const gameOverScreen = document.getElementById('game-over-screen');
            const finalMessage = document.getElementById('final-message');
            const resultGif = document.getElementById('result-gif');
            const finalScoreDisplay = document.getElementById('final-score');
            const playAgainButton = document.getElementById('play-again-button');
            const goodSound = document.getElementById('good-sound');
            const badSound = document.getElementById('bad-sound');

            const goodImages = ["good-mole.png", "heart.png", "flower.png"];
            const badImages = ["bad-mole.png"];

            function createHoles() {
                gameArea.innerHTML = '';
                holes.length = 0;
                for (let i = 0; i < 9; i++) {
                    const holeDiv = document.createElement('div');
                    holeDiv.classList.add('hole');
                    const moleDiv = document.createElement('div');
                    moleDiv.classList.add('mole');
                    moleDiv.addEventListener('click', whack);
                    holeDiv.appendChild(moleDiv);
                    gameArea.appendChild(holeDiv);
                    holes.push(holeDiv);
                }
            }

            function randomHole(currentHoles) {
                const idx = Math.floor(Math.random() * currentHoles.length);
                const hole = currentHoles[idx];
                if (hole === lastHole) return randomHole(currentHoles);
                lastHole = hole;
                return hole;
            }

            function randomTime(min, max) {
                return Math.round(Math.random() * (max - min) + min);
            }

            function popUpMole() {
                if (!gameStarted) return;
                const hole = randomHole(holes);
                const mole = hole.querySelector('.mole');
                const isBadMole = Math.random() < 0.25;
                const type = isBadMole ? 'bad' : 'good';
                const imageName = isBadMole
                    ? badImages[Math.floor(Math.random() * badImages.length)]
                    : goodImages[Math.floor(Math.random() * goodImages.length)];
                mole.innerHTML = `<img src="${imageName}" alt="${type}" style="width:64px;height:64px;pointer-events:none;" onerror="this.style.display='none'">`;
                mole.dataset.type = type;
                mole.classList.remove('hit');
                mole.classList.add('up');
                const popTime = randomTime(800, 1500);
                setTimeout(() => {
                    mole.classList.remove('up');
                    mole.innerHTML = '';
                    if (gameStarted) {
                        molePopTimerId = setTimeout(popUpMole, randomTime(1000, 1800));
                    }
                }, popTime);
            }

            function startGame() {
                score = 0;
                time = 30;
                gameStarted = true;
                scoreSpan.textContent = score;
                timeSpan.textContent = time;
                gameOverScreen.style.display = 'none';
                startButton.classList.remove('hidden');
                startButton.style.display = 'none';
                gameArea.querySelectorAll('.mole').forEach(mole => {
                    mole.classList.remove('up', 'hit');
                    mole.innerHTML = '';
                });
                popUpMole();
                timerId = setInterval(countdown, 1000);
            }

            function countdown() {
                time--;
                timeSpan.textContent = time;
                if (time <= 0) {
                    clearInterval(timerId);
                    clearTimeout(molePopTimerId);
                    gameStarted = false;
                    endGame();
                }
            }

            function whack(event) {
                if (!gameStarted || !event.isTrusted) return;
                const mole = event.target;
                if (!mole.classList.contains('up')) return;
                mole.classList.remove('up');
                mole.classList.add('hit');
                if (mole.dataset.type === 'good') {
                    score++;
                    goodSound.play();
                    createConfetti();
                } else {
                    score = Math.max(0, score - 5);
                    badSound.play();
                    createBombEffect(event.clientX, event.clientY);
                }
                scoreSpan.textContent = score;
            }

            function endGame() {
                gameOverScreen.style.display = 'flex';
                gameOverScreen.classList.add('active');
                finalScoreDisplay.textContent = `Your Score: ${score}`;
                if (rainInterval) clearInterval(rainInterval);
                document.querySelectorAll('.rain').forEach(el => el.remove());
                if (score >= 5) {
                    finalMessage.textContent = "Dammee Tompleteed!";
                    resultGif.src = "kiss.gif";
                    rainInterval = setInterval(() => createRain('❤️'), 200);
                } else {
                    finalMessage.textContent = "Naap Naap, try again!";
                    resultGif.src = "cry.gif";
                    rainInterval = setInterval(() => createRain('😭'), 200);
                }
            }

            function createConfetti() {
                const colors = ['#f4b942','#57a583','#ff9538','#c4552a','#ffd67a'];
                for (let i = 0; i < 15; i++) {
                    const confetti = document.createElement('div');
                    confetti.classList.add('confetti');
                    confetti.style.left = `${Math.random() * 100}vw`;
                    confetti.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
                    confetti.style.animationDelay = `${Math.random() * 0.5}s`;
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 2000);
                }
            }

            function createRain(emoji) {
                const rain = document.createElement('div');
                rain.classList.add('rain');
                rain.textContent = emoji;
                rain.style.left = `${Math.random() * 100}vw`;
                rain.style.animationDuration = `${Math.random() * 2 + 3}s`;
                document.body.appendChild(rain);
                setTimeout(() => { rain.remove(); }, 5000);
            }

            function createBombEffect(x, y) {
                const bomb = document.createElement('div');
                bomb.classList.add('bomb-effect');
                bomb.textContent = '💣';
                bomb.style.left = `${x - 24}px`;
                bomb.style.top = `${y - 24}px`;
                document.body.appendChild(bomb);
                setTimeout(() => { bomb.remove(); }, 500);
            }

            function setupGameListeners() {
                startButton.addEventListener('click', startGame);
                playAgainButton.addEventListener('click', () => {
                    gameOverScreen.style.display = 'none';
                    gameOverScreen.classList.remove('active');
                    startButton.style.display = '';
                    if (rainInterval) clearInterval(rainInterval);
                    document.querySelectorAll('.rain').forEach(el => el.remove());
                });
            }

            function initializeGame() {
                createHoles();
                setupGameListeners();
            }
        });
    </script>
</body>
</html>
