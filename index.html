<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truth or Dare</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;1,600;1,700&family=Orbitron:wght@400;500;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Meadow & Marigold palette (unchanged) */
            --forest-ink: #14322a;
            --moss-deep:  #1f5140;
            --sage:       #57a583;
            --sage-soft:  #b8e0c8;
            --meadow-0:   #f3faf1;
            --meadow-1:   #dff1e2;
            --cream:      #fff8ec;
            --honey:      #f4b942;
            --honey-2:    #e89a1b;
            --marigold:   #ff9538;
            --terracotta: #c4552a;

            --glass-bg:  rgba(255,255,255,0.20);
            --glass-brd: rgba(255,255,255,0.45);
            --shadow-lg: 0 20px 60px rgba(20,50,42,0.35);
            --grad-cta:  linear-gradient(135deg, #f4b942 0%, #e89a1b 50%, #c4552a 100%);
            --grad-leaf: linear-gradient(135deg, #57a583, #1f5140 70%, #14322a);
            --grad-soft: linear-gradient(135deg, rgba(255,255,255,0.45), rgba(255,255,255,0.15));
        }

        html, body {
            height: 100%; margin: 0; padding: 0;
            font-family: 'Nunito', system-ui, sans-serif;
            background: var(--meadow-0); color: var(--forest-ink);
            overflow: hidden;
        }
        * { box-sizing: border-box; }

        /* ===================================================== PRELOADER ===================================================== */
        #loader {
            position: fixed; inset: 0; z-index: 300;
            background:
              radial-gradient(1200px 700px at 20% 10%, #d6efd6 0%, transparent 60%),
              radial-gradient(900px 700px at 90% 90%, #ffe1a8 0%, transparent 55%),
              linear-gradient(135deg, #f0f9ea, #dff1e2 55%, #ffe8b8);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity .7s ease; overflow: hidden;
        }
        #loader .stage { position: relative; width: 160px; height: 160px; display: flex; align-items: center; justify-content: center; }
        .loader-heart {
            width: 86px; height: 86px;
            animation: beat 1.1s ease-in-out infinite;
            filter: drop-shadow(0 10px 24px rgba(196,85,42,0.45));
        }
        .loader-heart svg { width: 100%; height: 100%; display: block; }
        @keyframes beat {
            0%,100% { transform: scale(1); }
            30% { transform: scale(1.22); }
            45% { transform: scale(.95); }
            65% { transform: scale(1.12); }
            80% { transform: scale(.98); }
        }
        #loader .petals { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
        #loader .petal {
            position: absolute; bottom: -20px; width: 14px; height: 14px;
            background: linear-gradient(135deg, #ffd67a, #f4b942);
            border-radius: 50% 0 50% 50%;
            opacity: .8; animation: rise linear infinite;
        }
        @keyframes rise {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: .85; }
            100% { transform: translateY(-110vh) rotate(540deg); opacity: 0; }
        }
        #loader .msg {
            margin-top: 28px; font-family:'Fraunces', serif; font-style: italic;
            color: var(--moss-deep); letter-spacing: .04em; font-size: 18px;
            min-height: 26px; text-align: center; padding: 0 16px;
            animation: msgFade .6s ease;
        }
        #loader .dots { display:inline-block; width: 22px; text-align:left; }
        #loader .dots::after { content:''; animation: dots 1.4s steps(4, end) infinite; }
        @keyframes dots { 0%{content:'';} 25%{content:'.';} 50%{content:'..';} 75%{content:'...';} 100%{content:'';} }
        @keyframes msgFade { from { opacity:0; transform: translateY(6px);} to { opacity:1; transform:none;} }
        #loader .hint {
            margin-top: 10px; font-size: 12px; color: var(--terracotta);
            letter-spacing:.16em; text-transform: uppercase; opacity:.8;
            font-family: 'Orbitron', sans-serif;
        }

        /* ===================================================== LOCK ===================================================== */
        #password-overlay {
            position: fixed; inset: 0; z-index: 200;
            display: flex; align-items: center; justify-content: center; padding: 24px;
            background:
              radial-gradient(900px 600px at 15% 15%, rgba(87,165,131,.45), transparent 60%),
              radial-gradient(900px 600px at 85% 85%, rgba(244,185,66,.5), transparent 60%),
              linear-gradient(135deg, rgba(20,50,42,.55), rgba(196,85,42,.35));
            backdrop-filter: blur(14px) saturate(140%);
            transition: opacity .5s ease;
        }
        #lock-box {
            width: 100%; max-width: 380px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-brd);
            border-radius: 24px;
            padding: 32px 28px 28px;
            backdrop-filter: blur(24px) saturate(160%);
            box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,0.55);
            text-align: center;
            animation: floatIn .7s cubic-bezier(.2,.9,.2,1.1) both;
        }
        @keyframes floatIn { from { opacity: 0; transform: translateY(20px) scale(.96); } to { opacity: 1; transform: none; } }
        .lock-icon {
            width: 84px; height: 84px; margin: 0 auto 14px;
            position: relative; display: grid; place-items: center;
            border-radius: 50%;
            background: var(--grad-cta);
            box-shadow: 0 12px 30px rgba(196,85,42,.5), inset 0 2px 0 rgba(255,255,255,.5);
            animation: lockEntry 1.1s cubic-bezier(.2,.9,.2,1.3) both, lockBreath 3.6s ease-in-out 1.1s infinite;
        }
        .lock-icon::before {
            content: ''; position: absolute; inset: -14px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,.6);
            opacity: 0; animation: haloRing 2.8s ease-out 1.2s infinite;
            pointer-events: none;
        }
        .lock-icon svg { width: 42px; height: 42px; color: white; position: relative; z-index: 1; overflow: visible; }
        .lock-icon .shackle {
            transition: transform .6s cubic-bezier(.5,-0.4,.3,1.6);
            transform-origin: 0% 100%;
            transform-box: fill-box;
            animation: shackleJiggle 4s ease-in-out 1.4s infinite;
        }
        .lock-icon.unlocked { animation: lockPop .8s cubic-bezier(.2,.9,.2,1.4) both; }
        .lock-icon.unlocked .shackle { transform: rotate(-48deg) translate(0,-10px); animation: none; }
        .lock-icon::after {
            content: ''; position: absolute; inset: -8px; border-radius: 50%;
            background: radial-gradient(closest-side, rgba(255,255,255,.75), transparent 70%);
            opacity: 0; transition: opacity .5s; pointer-events: none;
        }
        .lock-icon.unlocked::after { opacity: 1; animation: pulseGlow 1s ease-out; }
        .lock-icon.wrong { animation: duduNo .55s cubic-bezier(.36,.07,.19,.97) both; }
        .lock-icon.wrong svg { animation: gifPop .55s ease-out both; }
        .lock-icon.wrong::after {
            opacity: 1;
            background: radial-gradient(closest-side, rgba(255,149,56,.8), transparent 70%);
            animation: pulseGlow .6s ease-out;
        }
        @keyframes duduNo {
            0%, 100% { transform: translateX(0) rotate(0); }
            15% { transform: translateX(-10px) rotate(-4deg); }
            30% { transform: translateX(10px)  rotate(4deg); }
            45% { transform: translateX(-8px)  rotate(-3deg); }
            60% { transform: translateX(8px)   rotate(3deg); }
            80% { transform: translateX(-3px)  rotate(-1deg); }
        }
        @keyframes gifPop { 0%{transform:scale(1);} 35%{transform:scale(1.12);} 70%{transform:scale(.96);} 100%{transform:scale(1);} }
        @keyframes pulseGlow { 0% { transform: scale(.9); opacity: .9; } 100% { transform: scale(1.8); opacity: 0; } }
        @keyframes lockEntry {
            0%   { opacity: 0; transform: translateY(-30px) scale(.4) rotate(-18deg); }
            60%  { opacity: 1; transform: translateY(6px) scale(1.08) rotate(4deg); }
            80%  { transform: translateY(-2px) scale(.98) rotate(-2deg); }
            100% { opacity: 1; transform: none; }
        }
        @keyframes lockBreath {
            0%,100% { box-shadow: 0 12px 30px rgba(196,85,42,.5), inset 0 2px 0 rgba(255,255,255,.5); transform: scale(1); }
            50%     { box-shadow: 0 18px 44px rgba(196,85,42,.6), inset 0 2px 0 rgba(255,255,255,.55); transform: scale(1.04); }
        }
        @keyframes shackleJiggle {
            0%, 88%, 100% { transform: rotate(0) translateY(0); }
            92% { transform: rotate(-6deg) translateY(-1px); }
            96% { transform: rotate(5deg) translateY(-1px); }
        }
        @keyframes haloRing { 0%{opacity:.6;transform:scale(.85);} 80%{opacity:0;transform:scale(1.35);} 100%{opacity:0;transform:scale(1.35);} }
        @keyframes lockPop { 0%{transform:scale(1);} 35%{transform:scale(1.22) rotate(-6deg);} 65%{transform:scale(.94) rotate(3deg);} 100%{transform:scale(1) rotate(0);} }
        #lock-box h3 {
            font-family: 'Fraunces', serif; font-style: italic;
            font-size: 22px; color: var(--cream); margin: 0 0 4px;
            text-shadow: 0 2px 10px rgba(20,50,42,.35);
        }
        #lock-box .sub { font-size: 13px; color: rgba(255,248,236,.85); margin: 0 0 18px; }
        #password-input {
            font-family: 'Orbitron', sans-serif;
            width: 100%; padding: 14px 16px;
            border-radius: 12px;
            border: 1.5px solid rgba(255,255,255,.4);
            background: rgba(255,255,255,.7);
            color: var(--moss-deep);
            font-size: 1.25rem; text-align: center; letter-spacing: 8px;
            transition: all .25s ease;
        }
        #password-input:focus { outline: none; border-color: var(--honey); background: white; box-shadow: 0 0 0 4px rgba(244,185,66,.28); }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 16px; }
        .key {
            padding: 14px 0; border-radius: 14px;
            border: 1px solid rgba(255,255,255,.5);
            background: var(--grad-soft);
            color: var(--cream);
            font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 600;
            cursor: pointer; user-select: none;
            transition: transform .12s ease, box-shadow .2s ease, background .2s ease, border-color .2s ease;
            backdrop-filter: blur(8px);
            animation: keyIn .5s ease both;
            text-shadow: 0 1px 4px rgba(20,50,42,.4);
        }
        .key:hover { background: linear-gradient(135deg, rgba(255,255,255,.6), rgba(255,255,255,.3)); border-color: rgba(255,255,255,.7); }
        .key:active { transform: scale(.92); box-shadow: 0 4px 12px rgba(196,85,42,.3); }
        .key.action { background: var(--grad-cta); color: white; border: none; text-shadow: none; }
        .key.action:hover { filter: brightness(1.05); }
        .key.ghost { background: rgba(255,255,255,.2); }
        @keyframes keyIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
        .keypad .key:nth-child(1){animation-delay:.05s}.keypad .key:nth-child(2){animation-delay:.09s}
        .keypad .key:nth-child(3){animation-delay:.13s}.keypad .key:nth-child(4){animation-delay:.17s}
        .keypad .key:nth-child(5){animation-delay:.21s}.keypad .key:nth-child(6){animation-delay:.25s}
        .keypad .key:nth-child(7){animation-delay:.29s}.keypad .key:nth-child(8){animation-delay:.33s}
        .keypad .key:nth-child(9){animation-delay:.37s}.keypad .key:nth-child(10){animation-delay:.41s}
        .keypad .key:nth-child(11){animation-delay:.45s}.keypad .key:nth-child(12){animation-delay:.49s}
        #submit-button { display: none; }
        #error-message { color: #ffd67a; font-size: .88rem; height: 1.1rem; margin-top: 10px; font-weight: 600; text-shadow: 0 0 8px rgba(196,85,42,.5); }
        @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-8px);} 75%{transform:translateX(8px);} }
        .shake { animation: shake 0.3s ease-in-out; }
        #wrong-gif {
            display: none;
            width: 150px; height: 150px;
            border-radius: 18px;
            margin: 12px auto 0;
            object-fit: cover;
            box-shadow: 0 8px 20px rgba(196,85,42,.35);
        }
        #wrong-gif.show { display: block; animation: floatIn .3s ease both; }

        /* ===================================================== INTERACTIVE BACKGROUND CANVAS ===================================================== */
        #meadow-canvas {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }

        /* ===================================================== MAIN CONTENT — TRUTH OR DARE ===================================================== */
        #main-content {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.6s ease-in;
            width: 100%;
            min-height: 100vh;
            position: absolute;
            top: 0; left: 0;
            padding: 1.25rem;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background:
              radial-gradient(1100px 700px at 15% 10%, #e6f4d9 0%, transparent 60%),
              radial-gradient(900px 700px at 90% 90%, #ffe1a8 0%, transparent 55%),
              linear-gradient(160deg, var(--meadow-0), var(--meadow-1) 60%, #ffeccc);
            overflow-y: auto;
        }
        #main-content.visible { visibility: visible; opacity: 1; }

        .td-header {
            text-align: center;
            margin-bottom: 1.25rem;
            position: relative; z-index: 2;
        }
        .td-title {
            font-family: 'Fraunces', serif; font-style: italic; font-weight: 700;
            font-size: clamp(2rem, 5vw, 3rem);
            background: linear-gradient(120deg, var(--moss-deep), var(--terracotta) 50%, var(--honey-2));
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 12px rgba(196,85,42,.25));
            margin: 0 0 4px;
        }
        .td-sub {
            font-size: .95rem; color: var(--moss-deep); opacity: .85;
            font-family: 'Nunito', sans-serif;
        }

        /* Turn indicator (Her / His) */
        #turn-strip {
            display: flex; gap: 10px; align-items: center; justify-content: center;
            margin-bottom: 1rem; position: relative; z-index: 2;
            font-family: 'Orbitron', sans-serif; font-size: .8rem; letter-spacing: .18em;
            text-transform: uppercase;
        }
        .turn-pill {
            padding: 8px 18px; border-radius: 999px;
            background: rgba(255,255,255,.55);
            border: 1.5px solid rgba(87,165,131,.35);
            color: var(--moss-deep);
            transition: all .35s cubic-bezier(.2,.9,.2,1.2);
            backdrop-filter: blur(6px);
            opacity: .55;
        }
        .turn-pill.active {
            background: var(--grad-cta); color: white; border-color: transparent;
            box-shadow: 0 8px 22px rgba(196,85,42,.35);
            transform: scale(1.06);
            opacity: 1;
        }

        /* Card */
        #card-stage {
            width: 100%; max-width: 520px;
            position: relative; z-index: 2;
            perspective: 1200px;
        }
        .td-card {
            background: linear-gradient(160deg, rgba(255,248,236,.96), rgba(223,241,226,.96));
            border-radius: 26px;
            padding: 2rem 1.75rem 1.5rem;
            box-shadow: 0 22px 55px rgba(20,50,42,.28), inset 0 1px 0 rgba(255,255,255,.85);
            border: 1.5px solid rgba(255,255,255,.7);
            min-height: 320px;
            display: flex; flex-direction: column;
            animation: cardIn .55s cubic-bezier(.2,.9,.2,1.2) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px) rotateX(-8deg) scale(.96); }
            to { opacity: 1; transform: none; }
        }
        .card-tag {
            align-self: flex-start;
            font-family: 'Orbitron', sans-serif; font-size: .72rem; letter-spacing: .22em;
            text-transform: uppercase; padding: 6px 14px;
            border-radius: 999px; color: white;
            background: var(--grad-cta);
            box-shadow: 0 6px 14px rgba(196,85,42,.32);
        }
        .card-tag.truth { background: linear-gradient(135deg, #57a583, #1f5140 80%); box-shadow: 0 6px 14px rgba(31,81,64,.35); }
        .card-for {
            margin-top: 14px;
            font-family: 'Fraunces', serif; font-style: italic;
            color: var(--terracotta); font-size: 1.05rem;
        }
        .card-body {
            font-family: 'Fraunces', serif;
            font-size: clamp(1.35rem, 3.2vw, 1.7rem);
            line-height: 1.35;
            color: var(--forest-ink);
            margin: 14px 0 22px;
            flex: 1;
        }
        .card-actions {
            display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
        }
        .td-btn {
            font-family: 'Nunito', sans-serif; font-weight: 800;
            padding: 12px 24px; border-radius: 999px; border: none;
            cursor: pointer; font-size: 1rem;
            letter-spacing: .04em;
            transition: transform .15s ease, filter .2s ease, box-shadow .2s ease;
        }
        .td-btn.primary {
            color: white; background: var(--grad-cta);
            box-shadow: 0 10px 22px rgba(196,85,42,.4), inset 0 1px 0 rgba(255,255,255,.35);
        }
        .td-btn.ghost {
            background: rgba(255,255,255,.7); color: var(--moss-deep);
            border: 1.5px solid rgba(87,165,131,.4);
        }
        .td-btn:hover { filter: brightness(1.06); transform: translateY(-2px); }
        .td-btn:active { transform: translateY(0); }
        .td-btn.done { background: linear-gradient(135deg, #57a583, #1f5140); color: white; box-shadow: 0 10px 22px rgba(31,81,64,.35); }
        .td-btn.skip { background: rgba(196,85,42,.12); color: var(--terracotta); border: 1.5px solid rgba(196,85,42,.35); }

        /* Choose (truth vs dare) view */
        .choose-wrap { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
        .choose-btn {
            flex: 1 1 180px;
            padding: 26px 18px;
            border-radius: 22px; border: none; cursor: pointer;
            font-family: 'Fraunces', serif; font-style: italic;
            font-size: 1.6rem; color: white;
            transition: transform .18s ease, filter .2s ease, box-shadow .2s ease;
            box-shadow: 0 12px 28px rgba(20,50,42,.25);
        }
        .choose-btn.truth { background: linear-gradient(135deg, #57a583 0%, #1f5140 90%); }
        .choose-btn.dare { background: var(--grad-cta); }
        .choose-btn:hover { transform: translateY(-3px); filter: brightness(1.08); }
        .choose-btn small {
            display: block; font-family: 'Orbitron', sans-serif; font-style: normal;
            font-size: .7rem; letter-spacing: .22em; opacity: .85; margin-bottom: 6px;
        }

        /* Scoreboard */
        #score-strip {
            display: flex; gap: 14px; margin-top: 1rem;
            font-family: 'Nunito', sans-serif; font-size: .9rem;
            position: relative; z-index: 2;
        }
        .score-pill {
            padding: 8px 16px; border-radius: 999px;
            background: rgba(255,255,255,.75);
            border: 1.5px solid rgba(87,165,131,.3);
            color: var(--moss-deep); font-weight: 700;
        }
        .score-pill b { color: var(--terracotta); margin-left: 6px; }

        .hidden { display: none !important; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation: none !important; transition: none !important; }
        }
    </style>
</head>
<body>

    <!-- Preloader -->
    <div id="loader">
      <div class="petals" id="loaderPetals"></div>
      <div class="stage">
        <div class="loader-heart">
          <svg viewBox="0 0 24 24" fill="url(#heartGrad)" aria-hidden="true">
            <defs>
              <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ffd67a"/>
                <stop offset="55%" stop-color="#f4b942"/>
                <stop offset="100%" stop-color="#c4552a"/>
              </linearGradient>
            </defs>
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
          </svg>
        </div>
      </div>
      <p class="msg"><span id="loaderMsg">Lighting the candles</span><span class="dots"></span></p>
      <p class="hint">Setting the mood</p>
    </div>

    <!-- Lock -->
    <div id="password-overlay">
        <form id="lock-box" autocomplete="off">
            <div class="lock-icon" id="lockIcon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path class="shackle" d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    <rect x="4" y="11" width="16" height="10" rx="2"/>
                </svg>
            </div>
            <h3>Only for Us</h3>
            <p class="sub">Type the secret code 🔥</p>
            <input id="password-input" type="password" inputmode="numeric" maxlength="8" placeholder="• • • • • • • •" autocomplete="off">
            <div class="keypad" id="keypad">
                <button type="button" class="key" data-k="1">1</button>
                <button type="button" class="key" data-k="2">2</button>
                <button type="button" class="key" data-k="3">3</button>
                <button type="button" class="key" data-k="4">4</button>
                <button type="button" class="key" data-k="5">5</button>
                <button type="button" class="key" data-k="6">6</button>
                <button type="button" class="key" data-k="7">7</button>
                <button type="button" class="key" data-k="8">8</button>
                <button type="button" class="key" data-k="9">9</button>
                <button type="button" class="key ghost" data-k="clear">⌫</button>
                <button type="button" class="key" data-k="0">0</button>
                <button type="submit" class="key action">Open</button>
            </div>
            <p id="error-message"></p>
            <img id="wrong-gif" src="dudu-no-dudu.gif" alt="Dudu Bubu saying no">
            <button id="submit-button" type="submit" aria-hidden="true">Unlock</button>
        </form>
    </div>

    <!-- Interactive background -->
    <canvas id="meadow-canvas"></canvas>

    <!-- Main Content -->
    <div id="main-content">
        <div class="td-header">
            <h1 class="td-title">Truth or Dare · After Hours</h1>

    <script>
        /* ---------- Loader ---------- */
        (function initLoader(){
            const petals = document.getElementById('loaderPetals');
            if (petals) {
                for (let i = 0; i < 40; i++) {
                    const p = document.createElement('span');
                    p.className = 'petal';

                    p.style.animationDuration = dur + 's';
                    p.style.animationDelay = (-Math.random() * dur) + 's';
                    const size = 2 + Math.random() * 3;

                    p.style.height = size + 'px';
                    p.style.opacity = (.5 + Math.random() * .5).toFixed(2);
                    petals.appendChild(p);

            const msgEl = document.getElementById('loaderMsg');
            const messages = [
                'Lighting the candles',
                'Pouring something sweet',
                'Whispering the rules',
                'Loading the naughty deck',
                'Almost ready, gorgeous'
            ];
            let mi = 0;
            const msgTimer = setInterval(() => {
                if (!msgEl) return;
                mi = (mi + 1) % messages.length;
                msgEl.style.animation = 'none';
                void msgEl.offsetWidth;
                msgEl.style.animation = '';
                msgEl.textContent = messages[mi];
            }, 1600);
            window.addEventListener('load', () => {
                setTimeout(() => {
                    clearInterval(msgTimer);
                    const l = document.getElementById('loader');
                    if (!l) return;
                    l.style.opacity = '0';
                    setTimeout(() => l.remove(), 700);
                }, 1200);
            });
        })();

        document.addEventListener('DOMContentLoaded', () => {

            /* ---------- Lock ---------- */
            const passwordOverlay = document.getElementById('password-overlay');
            const lockBox = document.getElementById('lock-box');
            const passwordInput = document.getElementById('password-input');
            const errorMessage = document.getElementById('error-message');
            const mainContent = document.getElementById('main-content');
            const lockIcon = document.getElementById('lockIcon');
            const correctPassword = "28072018";

            if (sessionStorage.getItem('isUnlocked') === 'true') {
                passwordOverlay.style.display = 'none';
                mainContent.classList.add('visible');
                initializeGame();
            }

            document.getElementById('keypad').addEventListener('click', (e) => {
                const k = e.target.closest('.key');
                if (!k) return;
                const v = k.dataset.k;
                if (!v) return;
                if (v === 'clear') passwordInput.value = passwordInput.value.slice(0, -1);
                else if (passwordInput.value.length < 8) passwordInput.value += v;
            });

            lockBox.addEventListener('submit', (e) => {
                e.preventDefault();
                const enteredPassword = passwordInput.value;
                if (enteredPassword === correctPassword) {
                    sessionStorage.setItem('isUnlocked', 'true');
                    lockIcon.classList.remove('wrong');
                    const wrongGif = document.getElementById('wrong-gif');
                    if (wrongGif) wrongGif.classList.remove('show');
                    lockIcon.classList.add('unlocked');
                    setTimeout(() => {
                        passwordOverlay.style.opacity = '0';
                        setTimeout(() => { passwordOverlay.style.display = 'none'; }, 500);
                        mainContent.classList.add('visible');
                        initializeGame();
                    }, 600);
                } else {
                    errorMessage.textContent = 'Wrong Password. Try Again!';
                    lockBox.classList.add('shake');
                    const wrongGif = document.getElementById('wrong-gif');
                    lockIcon.classList.remove('wrong');
                    void lockIcon.offsetWidth;
                    lockIcon.classList.add('wrong');
                    if (wrongGif) {
                        wrongGif.classList.remove('show');
                        void wrongGif.offsetWidth;
                        wrongGif.classList.add('show');
                    }
                    passwordInput.value = '';
                    setTimeout(() => {
                        lockBox.classList.remove('shake');
                        lockIcon.classList.remove('wrong');
                        errorMessage.textContent = '';
                        if (wrongGif) wrongGif.classList.remove('show');
                    }, 1400);
                }
            });

            /* ---------- Interactive Meadow Background ---------- */
            (function meadowBG(){
                const c = document.getElementById('meadow-canvas');
                const ctx = c.getContext('2d');
                let W = 0, H = 0, dpr = Math.min(window.devicePixelRatio || 1, 2);
                const mouse = { x: -9999, y: -9999, active: false };

                function resize(){
                    W = window.innerWidth; H = window.innerHeight;
                    c.width = W * dpr; c.height = H * dpr;
                    c.style.width = W + 'px'; c.style.height = H + 'px';
                    ctx.setTransform(dpr,0,0,dpr,0,0);
                }
                window.addEventListener('resize', resize);
                resize();

                window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true; });
                window.addEventListener('mouseleave', () => { mouse.active = false; mouse.x = mouse.y = -9999; });
                window.addEventListener('touchmove', e => {
                    if (e.touches[0]) { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; mouse.active = true; }
                }, {passive:true});
                window.addEventListener('touchend', () => { mouse.active = false; mouse.x = mouse.y = -9999; });

                // Slow drifting blobs
                const palette = ['#f4b942','#e89a1b','#c4552a','#ff9538','#57a583','#b8e0c8','#ffd67a'];
                const blobs = [];
                for (let i=0;i<6;i++){
                    blobs.push({
                        x: Math.random()*W, y: Math.random()*H,
                        r: 180 + Math.random()*220,
                        c: palette[i % palette.length],
                        vx: (Math.random()-.5)*0.25,
                        vy: (Math.random()-.5)*0.25
                    });
                }

                // Floating petals / fireflies
                const parts = [];
                const N = 90;
                for (let i=0;i<N;i++){
                    parts.push({
                        x: Math.random()*W, y: Math.random()*H,
                        r: 1.2 + Math.random()*2.6,
                        c: palette[Math.floor(Math.random()*palette.length)],
                        vx: (Math.random()-.5)*.5,
                        vy: -0.15 - Math.random()*0.5,
                        tw: Math.random()*Math.PI*2,
                        tws: 0.02 + Math.random()*0.04
                    });
                }

                function hexA(hex, a){
                    const n = parseInt(hex.slice(1),16);
                    return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
                }

                function tick(){
                    ctx.clearRect(0,0,W,H);

                    // Nebula blobs
                    blobs.forEach(b=>{
                        b.x += b.vx; b.y += b.vy;
                        if (b.x < -b.r) b.x = W + b.r;
                        if (b.x > W + b.r) b.x = -b.r;
                        if (b.y < -b.r) b.y = H + b.r;
                        if (b.y > H + b.r) b.y = -b.r;
                        const g = ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
                        g.addColorStop(0, hexA(b.c, .28));
                        g.addColorStop(1, hexA(b.c, 0));
                        ctx.fillStyle = g;
                        ctx.beginPath();
                        ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
                        ctx.fill();
                    });

                    // Cursor warm bloom
                    if (mouse.active){
                        const gr = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 220);
                        gr.addColorStop(0, 'rgba(255,149,56,0.22)');
                        gr.addColorStop(1, 'rgba(255,149,56,0)');
                        ctx.fillStyle = gr;
                        ctx.beginPath();
                        ctx.arc(mouse.x, mouse.y, 220, 0, Math.PI*2);
                        ctx.fill();
                    }

                    // Fireflies / petals with cursor interaction
                    parts.forEach(p=>{
                        // cursor push
                        if (mouse.active){
                            const dx = p.x - mouse.x, dy = p.y - mouse.y;
                            const d2 = dx*dx + dy*dy;
                            if (d2 < 170*170){
                                const d = Math.sqrt(d2) || 1;
                                const f = (170 - d) / 170 * 1.6;
                                p.vx += (dx/d) * f * 0.06;
                                p.vy += (dy/d) * f * 0.06;
                            }
                        }
                        p.vx *= 0.985; p.vy = p.vy*0.985 - 0.005;
                        p.x += p.vx; p.y += p.vy;
                        p.tw += p.tws;
                        if (p.y < -10) { p.y = H + 10; p.x = Math.random()*W; }
                        if (p.x < -10) p.x = W + 10;
                        if (p.x > W + 10) p.x = -10;

                        const glow = 0.55 + 0.45*Math.sin(p.tw);
                        ctx.shadowBlur = 14;
                        ctx.shadowColor = p.c;
                        ctx.fillStyle = hexA(p.c, 0.5 + 0.5*glow);
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                        ctx.fill();
                    });
                    ctx.shadowBlur = 0;

                    requestAnimationFrame(tick);
                }
                tick();
            })();

            /* ---------- Truth or Dare Game ---------- */
            const TRUTHS = {
                her: [
                    "What's the naughtiest thing you've ever fantasized about doing with me?",
                    "Where's the most inappropriate place you've thought about us hooking up?",
                    "What outfit of mine turns you on the most, and why?",
                    "What's a secret kink you've never told me about?",
                    "When was the last time you touched yourself thinking about me?",
                    "Which part of my body drives you the wildest?",
                    "What's the dirtiest dream you've ever had about me?",
                    "If you could rewrite one of our nights, which one and how?",

                    "Have you ever moaned my name when I wasn't around?",
                    "What's your favorite thing I've whispered to you in bed?",
                    "Have you ever pictured me while you were alone in the shower?",
                    "What's a fantasy you'd want us to try this week?",
                    "What's the most turned on I've ever made you feel — when was it?",
                    "Rate my kissing, my touch, and my bedroom skills from 1–10.",
                    "What's the one thing I do that instantly gets you wet?",
                    "Have you ever fantasized about being tied up by me?",
                    "What's the wildest place you'd want me to take you?",
                    "Do you prefer me being rough, slow, or somewhere in between?",
                    "What's your favorite position with me and why?",
                    "Truthfully — how often do you think about me sexually?",
                    "What's something taboo you'd secretly love to try together?",
                    "What's the most turned-on thing I've ever texted you?",
                    "What's one word to describe how I taste?",
                    "Would you rather I be dominant or worship you tonight?"
                ],
                his: [
                    "What's your dirtiest fantasy about me you've never said out loud?",
                    "Where do you most want my hands on you right now?",
                    "What's the naughtiest thought you had about me today?",
                    "What's a secret kink of yours I don't know yet?",
                    "When did you last touch yourself thinking about me?",
                    "Which part of your body do you want me to obsess over tonight?",
                    "What's the dirtiest dream you've had about us?",
                    "What outfit do you want to see me in in bed?",
                    "What's something you want me to do to you but haven't asked?",
                    "Have you ever moaned my name when you were alone?",
                    "What was the hottest thing I've ever whispered to you?",
                    "Have you ever pictured me while in the shower?",
                    "What's a fantasy you'd want us to try this week?",
                    "When was the most turned-on I've made you feel?",
                    "Rate my kissing, my touch, and my bedroom skills from 1–10.",
                    "What's the one thing I do that instantly makes you hard/wet?",
                    "Have you ever fantasized about tying me up?",
                    "What's the wildest place you'd want to take me?",
                    "Do you prefer me shy, wild, or in charge in bed?",
                    "What's your absolute favorite position with me?",
                    "How often does your mind wander to us being naked together?",
                    "What taboo thing do you secretly want to try with me?",
                    "What's the sexiest text I've ever sent you?",
                    "Describe how I taste in one word.",
                    "Would you rather I ride you slow or beg you tonight?"
                ]
            };

            const DARES = {
                her: [
                    "Take off one piece of clothing — my choice.",
                    "Kiss me somewhere I don't expect, for 30 seconds.",
                    "Give me a slow, teasing lap dance for the length of one song.",
                    "Whisper the dirtiest thing in your head into my ear right now.",
                    "Send me the last thing you searched — no editing.",
                    "Let me blindfold you and feed you something with my fingers.",
                    "Take a photo of the part of me you love most — and describe why.",
                    "Kiss me like it's our very last kiss.",
                    "Give me a 60-second neck & ear kiss with no hands.",
                    "Strip down to just one item and stay that way until my next turn.",
                    "Trace my body with your fingertips for a full minute — no talking.",

                    "Show me your favorite thing to do to yourself — slowly.",
                    "Text me the filthiest sentence you can think of right now.",
                    "Bite me somewhere gently — you pick where.",
                    "Let me undress you one piece at a time between rounds.",
                    "Make out with me until the next timer goes off.",
                    "Do the next round in only your underwear.",
                    "Take a shot / sip and lick it off my collarbone.",
                    "Give me a massage anywhere I choose for 90 seconds.",
                    "Whisper what you want me to do to you tonight — in detail.",
                    "Suck on my finger like it's something else.",
                    "Straddle me and just breathe with me for 30 seconds.",
                    "Kiss me with your eyes locked on mine, no looking away.",
                    "Send me a mirror pic in whatever you're wearing right now."
                ],
                his: [
                    "Take off one piece of clothing — my choice.",
                    "Kiss me somewhere I don't expect, for 30 seconds.",
                    "Pin me against the nearest wall and kiss me hard.",
                    "Whisper your dirtiest fantasy in my ear right now.",
                    "Show me the last spicy thing you searched.",
                    "Feed me something with your fingers — I keep my eyes closed.",
                    "Take a photo of the part of me you love most and tell me why.",

                    "Strip down to one item and stay that way until my next turn.",
                    "Trace every curve of my body with your fingertips, silently, for a full minute.",
                    "Sit me in your lap and hold me still for a minute.",
                    "Show me your favorite way to touch yourself — slowly.",
                    "Text me the filthiest sentence you can think of, right now.",
                    "Bite me gently somewhere — you choose.",
                    "Undress me one piece at a time between rounds.",
                    "Make out with me until the next timer goes off.",
                    "Do the next round shirtless.",
                    "Do a shot / sip and lick it off my neck.",
                    "Give me a 90-second massage anywhere I say.",
                    "Whisper exactly what you plan to do to me tonight.",
                    "Suck on my finger like it's something else.",
                    "Pick me up and carry me across the room.",
                    "Kiss me with your eyes locked on mine — no looking away.",
                    "Send me a mirror pic of what you're wearing right now."
                ]
            };

            const players = ['her','his'];
            const labels  = { her: 'For Her 💋', his: 'For Him 🔥' };
            let turn = 0; // 0 = her, 1 = his
            const pool = { her: { truth: [], dare: [] }, his: { truth: [], dare: [] } };
            const score = { her: 0, his: 0 };

            const cardStage   = document.getElementById('card-stage');
            const pillHer     = document.getElementById('pill-her');
            const pillHis     = document.getElementById('pill-his');
            const herScoreEl  = document.getElementById('her-score');
            const hisScoreEl  = document.getElementById('his-score');
            const poolLeftEl  = document.getElementById('pool-left');

            function shuffle(arr){
                const a = arr.slice();
                for (let i=a.length-1;i>0;i--){
                    const j = Math.floor(Math.random()*(i+1));
                    [a[i],a[j]] = [a[j],a[i]];
                }
                return a;
            }

            function refillPool(who){
                pool[who].truth = shuffle(TRUTHS[who]);
                pool[who].dare  = shuffle(DARES[who]);
            }

            function updateUI(){
                const who = players[turn];
                pillHer.classList.toggle('active', who === 'her');
                pillHis.classList.toggle('active', who === 'his');
                herScoreEl.textContent = score.her;
                hisScoreEl.textContent = score.his;
                const remaining = pool.her.truth.length + pool.her.dare.length + pool.his.truth.length + pool.his.dare.length;
                poolLeftEl.textContent = remaining;
            }

            function renderChoose(){
                const who = players[turn];
                cardStage.innerHTML = `
                    <div class="td-card">
                        <span class="card-tag">${labels[who]}</span>
                        <p class="card-for">Pick your poison, gorgeous.</p>
                        <div class="card-body" style="text-align:center;">
                            Choose <b>Truth</b> to answer honestly,<br/>
                            or <b>Dare</b> to earn it.
                        </div>
                        <div class="choose-wrap">
                            <button class="choose-btn truth" data-type="truth"><small>SPILL</small>Truth</button>
                            <button class="choose-btn dare"  data-type="dare"><small>DO IT</small>Dare</button>
                        </div>
                    </div>
                `;
                cardStage.querySelectorAll('.choose-btn').forEach(b => {
                    b.addEventListener('click', () => renderPrompt(b.dataset.type));
                });
                updateUI();
            }

            function renderPrompt(type){
                const who = players[turn];
                if (pool[who][type].length === 0) {
                    // Refill only this deck when empty
                    pool[who][type] = shuffle(type === 'truth' ? TRUTHS[who] : DARES[who]);
                }
                const prompt = pool[who][type].pop();
                const tagClass = type === 'truth' ? 'truth' : '';
                const tagText  = type === 'truth' ? 'TRUTH' : 'DARE';

                cardStage.innerHTML = `
                    <div class="td-card">
                        <span class="card-tag ${tagClass}">${tagText} · ${labels[who]}</span>
                        <p class="card-for">${who === 'her' ? 'Her turn' : 'His turn'} — no chickening out 😉</p>
                        <div class="card-body">"${prompt}"</div>
                        <div class="card-actions">
                            <button class="td-btn done" data-a="done">✅ Done · +1</button>
                            <button class="td-btn skip" data-a="skip">Skip · -1</button>
                            <button class="td-btn ghost" data-a="reroll">🔄 Reroll</button>
                        </div>
                    </div>
                `;
                cardStage.querySelectorAll('.td-btn').forEach(b => {
                    b.addEventListener('click', () => {
                        const a = b.dataset.a;
                        if (a === 'done'){
                            score[who] += 1;
                            nextTurn();
                        } else if (a === 'skip'){
                            score[who] = Math.max(0, score[who] - 1);
                            nextTurn();
                        } else if (a === 'reroll'){
                            renderPrompt(type);
                        }
                    });
                });
                updateUI();
            }

            function nextTurn(){
                turn = 1 - turn;
                renderChoose();
            }

            function initializeGame(){
                refillPool('her');
                refillPool('his');
                turn = 0;
                score.her = 0; score.his = 0;
                renderChoose();
            }
        });
    </script>
